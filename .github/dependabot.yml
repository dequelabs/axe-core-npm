version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
    groups:
      # Any updates not caught by the group config will get individual PRs
      gha-low-risk:
        update-types:
          - 'minor'
          - 'patch'
    cooldown:
      default-days: 7

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
    ignore:
      # Handled separately by its own workflow
      - dependency-name: '@axe-core/*'
      - dependency-name: 'axe-core'
      # Prevent updates to ESM-only versions
      - dependency-name: 'execa'
        versions: ['>=6.0.0']
      - dependency-name: 'node-fetch'
        versions: ['>=3.0.0']
      - dependency-name: 'delay'
        versions: ['>=6.0.0']
      - dependency-name: 'tempy'
        versions: ['>=2.0.0']
      - dependency-name: 'chai'
        versions: ['>=5.0.0']
      - dependency-name: 'lerna'
        versions: ['>=8.1.3']
      # Breaking change due to node version requirements
      - dependency-name: 'commander'
        versions: ['>=10.0.0']
      # Not supported
      # @see https://github.com/dequelabs/axe-core-npm/issues/500
      - dependency-name: 'react'
        versions: ['>=18.0.0']
      - dependency-name: 'react-dom'
        versions: ['>=18.0.0']
      - dependency-name: '@types/react'
        versions: ['>=18.0.0']
      - dependency-name: '@types/react-dom'
        versions: ['>=18.0.0']
      # Keep @types/node aligned with the Node.js major version being developed on
      # to avoid type incompatibilities and unexpected breaking changes
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      # Any updates not caught by the group config will get individual PRs
      npm-low-risk:
        update-types:
          - 'minor'
          - 'patch'
    cooldown:
      default-days: 7
