name: Deploy

on:
  push:
    branches:
      - develop
      - release
      - master

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: registry.npmjs.org
    permissions:
      # Required for OIDC
      id-token: write
      contents: read
    if: github.ref_name == 'develop' && github.repository_owner == 'dequelabs'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          registry-url: 'https://registry.npmjs.org/'
          node-version: 24
          cache: 'npm'
      - name: Update npm to 11 if needed
        run: |
          CURRENT_NPM=$(npm -v | cut -d. -f1)
          if [ "$CURRENT_NPM" -lt 11 ]; then
            npm install -g npm@11
          fi
      - run: npm ci
      # Ensure packages are built
      - run: npm run build
      # Make sure the working tree is clean
      - run: git reset --hard HEAD
      - run: |
          npx lerna publish prepatch \
            --no-verify-access \
            --no-git-tag-version \
            --no-push \
            --canary \
            --dist-tag=next \
            --exact \
            --preid=$(git rev-parse --short HEAD) \
            --force-publish \
            --yes

  release-candidate:
    runs-on: ubuntu-latest
    environment: registry.npmjs.org
    permissions:
      # Required for OIDC
      id-token: write
      contents: read
    if: github.ref_name == 'release' && github.repository_owner == 'dequelabs'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          registry-url: 'https://registry.npmjs.org/'
          node-version: 24
          cache: 'npm'
      - name: Update npm to 11 if needed
        run: |
          CURRENT_NPM=$(npm -v | cut -d. -f1)
          if [ "$CURRENT_NPM" -lt 11 ]; then
            npm install -g npm@11
          fi
      - run: npm ci
      # Ensure packages are built
      - run: npm run build
      # Make sure the working tree is clean
      - run: git reset --hard HEAD
      - run: |
          npx lerna publish prepatch \
            --no-verify-access \
            --no-git-tag-version \
            --no-push \
            --canary \
            --dist-tag=rc \
            --exact \
            --preid=$(git rev-parse --short HEAD) \
            --force-publish \
            --yes

  production:
    runs-on: ubuntu-latest
    environment: registry.npmjs.org
    permissions:
      # Required for OIDC
      id-token: write
      contents: read
    if: github.ref_name == 'master' && github.repository_owner == 'dequelabs'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          registry-url: 'https://registry.npmjs.org/'
          node-version: 24
          cache: 'npm'
      - name: Update npm to 11 if needed
        run: |
          CURRENT_NPM=$(npm -v | cut -d. -f1)
          if [ "$CURRENT_NPM" -lt 11 ]; then
            npm install -g npm@11
          fi
      - run: npm ci
      # Ensure packages are built
      - run: npm run build
      # Make sure the working tree is clean
      - run: git reset --hard HEAD
      - run: |
          npx lerna publish from-package \
            --force-publish='*' \
            --yes
      - run: |
          PKG_VERSION=$(jq -r .version < lerna.json)
          gh release create v$PKG_VERSION \
            --title "Release $PKG_VERSION" \
            --notes-from-tag \
            --target master
        env:
          GH_TOKEN: ${{ github.token }}
